# ============================================================
#  AJKMart - Deploy Workflow
#  Triggers: Push to main/master branch only
#  What it does: Build Docker images and deploy via SSH to VPS
#
#  Required GitHub Secrets (Settings → Secrets → Actions):
#  ┌─────────────────────┬──────────────────────────────────────┐
#  │ Secret Name         │ Description                          │
#  ├─────────────────────┼──────────────────────────────────────┤
#  │ SSH_HOST            │ Your server IP or domain             │
#  │ SSH_USERNAME        │ SSH user (e.g. ubuntu, root)         │
#  │ SSH_PRIVATE_KEY     │ Your private SSH key (id_rsa)        │
#  │ SSH_PORT            │ SSH port (usually 22)                │
#  │ DATABASE_URL        │ PostgreSQL connection string         │
#  │ ADMIN_SECRET        │ Admin secret key                     │
#  │ ALLOWED_ORIGINS     │ Comma-separated frontend URLs        │
#  │ VITE_API_URL        │ API URL for frontend builds          │
#  │ VITE_API_BASE_URL   │ API base URL for frontend builds     │
#  │ EXPO_PUBLIC_DOMAIN  │ Domain for mobile app                │
#  └─────────────────────┴──────────────────────────────────────┘
# ============================================================

name: Deploy to Server

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  DEPLOY_PATH: /opt/ajkmart

jobs:
  # ------------------------------------------------------------
  # Job 1: Build all applications
  # ------------------------------------------------------------
  build:
    name: Build Applications
    runs-on: ubuntu-latest
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}

    steps:
      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "Error: DATABASE_URL secret is required for build"
            exit 1
          fi
          if [ -z "${{ secrets.VITE_API_URL }}" ]; then
            echo "Error: VITE_API_URL secret is required for build"
            exit 1
          fi
          if [ -z "${{ secrets.VITE_API_BASE_URL }}" ]; then
            echo "Error: VITE_API_BASE_URL secret is required for build"
            exit 1
          fi
          if [ -z "${{ secrets.EXPO_PUBLIC_DOMAIN }}" ]; then
            echo "Error: EXPO_PUBLIC_DOMAIN secret is required for build"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run tests
        run: pnpm test 2>/dev/null || echo "No tests found, skipping..."

      - name: Build shared libraries
        run: pnpm run typecheck:libs

      - name: Build API Server
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm --filter @workspace/api-server run build

      - name: Build Admin Panel
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: pnpm --filter @workspace/admin run build

      - name: Build Vendor App
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: pnpm --filter @workspace/vendor-app run build

      - name: Build Rider App
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: pnpm --filter @workspace/rider-app run build

      - name: Verify builds
        run: |
          if [ ! -d "artifacts/api-server/dist" ]; then
            echo "❌ API Server build failed"
            exit 1
          fi
          if [ ! -d "artifacts/admin/dist" ]; then
            echo "❌ Admin Panel build failed"
            exit 1
          fi
          if [ ! -d "artifacts/vendor-app/dist" ]; then
            echo "❌ Vendor App build failed"
            exit 1
          fi
          if [ ! -d "artifacts/rider-app/dist" ]; then
            echo "❌ Rider App build failed"
            exit 1
          fi
          if [ ! -d "artifacts/ajkmart/dist" ]; then
            echo "❌ AJKMart build failed"
            exit 1
          fi
          echo "✅ All builds successful"

      - name: Package API build
        run: |
          tar -czf api-dist.tar.gz \
            artifacts/api-server/dist/ \
            artifacts/api-server/package.json \
            lib/ \
            package.json \
            pnpm-workspace.yaml \
            pnpm-lock.yaml \
            docker-compose.yml \
            .env.example

      - name: Package frontend builds
        run: |
          tar -czf frontend-dist.tar.gz \
            artifacts/admin/dist/ \
            artifacts/vendor-app/dist/ \
            artifacts/rider-app/dist/ \
            artifacts/ajkmart/dist/ \
            nginx.conf

      - name: Upload API package
        uses: actions/upload-artifact@v4
        with:
          name: api-package
          path: api-dist.tar.gz
          retention-days: 1

      - name: Upload frontend package
        uses: actions/upload-artifact@v4
        with:
          name: frontend-package
          path: frontend-dist.tar.gz
          retention-days: 1

  # ------------------------------------------------------------
  # Job 2: Deploy to VPS via SSH
  # ------------------------------------------------------------
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.SSH_HOST }}" ]; then
            echo "Error: SSH_HOST secret is not set. Please configure it in repository settings."
            exit 1
          fi
          if [ -z "${{ secrets.SSH_USERNAME }}" ]; then
            echo "Error: SSH_USERNAME secret is not set. Please configure it in repository settings."
            exit 1
          fi
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "Error: SSH_PRIVATE_KEY secret is not set. Please configure it in repository settings."
            exit 1
          fi
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "Error: DATABASE_URL secret is not set. Please configure it in repository settings."
            exit 1
          fi
          if [ -z "${{ secrets.ADMIN_SECRET }}" ]; then
            echo "Error: ADMIN_SECRET secret is not set. Please configure it in repository settings."
            exit 1
          fi
          if [ -z "${{ secrets.ALLOWED_ORIGINS }}" ]; then
            echo "Error: ALLOWED_ORIGINS secret is not set. Please configure it in repository settings."
            exit 1
          fi

      - name: Download API package
        uses: actions/download-artifact@v4
        with:
          name: api-package

      - name: Download frontend package
        uses: actions/download-artifact@v4
        with:
          name: frontend-package

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT != '' && secrets.SSH_PORT || '22' }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
          # Test SSH connection
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT || 22 }} -o ConnectTimeout=10 ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "echo 'SSH connection successful'"

      - name: Check server requirements
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
            # Check if required tools are installed
            if ! command -v node &> /dev/null; then
              echo "❌ Node.js not installed on server"
              exit 1
            fi
            if ! command -v npm &> /dev/null; then
              echo "❌ npm not installed on server"
              exit 1
            fi
            if ! command -v nginx &> /dev/null; then
              echo "❌ nginx not installed on server"
              exit 1
            fi

            # Check if directories exist and are writable
            if [ ! -w "/opt" ]; then
              echo "❌ /opt directory not writable"
              exit 1
            fi
            if [ ! -w "/usr/share/nginx/html" ]; then
              echo "❌ nginx html directory not writable"
              exit 1
            fi

            echo "✅ Server requirements met"
          ENDSSH

      - name: Upload builds to server
        run: |
          scp -i ~/.ssh/deploy_key \
            -P ${{ secrets.SSH_PORT || 22 }} \
            api-dist.tar.gz frontend-dist.tar.gz \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/tmp/

      - name: Deploy on server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          EXPO_PUBLIC_DOMAIN: ${{ secrets.EXPO_PUBLIC_DOMAIN }}
          SHA_SHORT: ${{ needs.build.outputs.sha_short }}
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT || 22 }} \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
            set -e

            DEPLOY_PATH="/opt/ajkmart"
            BACKUP_PATH="/opt/ajkmart-backup-$(date +%Y%m%d-%H%M%S)"

            echo "==> Creating backup..."
            if [ -d "$DEPLOY_PATH" ]; then
              sudo cp -r $DEPLOY_PATH $BACKUP_PATH
              echo "Backup created at: $BACKUP_PATH"
            fi

            mkdir -p $DEPLOY_PATH

            echo "==> Extracting builds..."
            cd $DEPLOY_PATH
            tar -xzf /tmp/api-dist.tar.gz
            tar -xzf /tmp/frontend-dist.tar.gz

            echo "==> Setting up nginx directories..."
            sudo mkdir -p /usr/share/nginx/html/admin
            sudo mkdir -p /usr/share/nginx/html/vendor
            sudo mkdir -p /usr/share/nginx/html/rider

            # Copy frontend builds to nginx directories
            sudo cp -r $DEPLOY_PATH/artifacts/admin/dist/* /usr/share/nginx/html/admin/ 2>/dev/null || true
            sudo cp -r $DEPLOY_PATH/artifacts/vendor-app/dist/* /usr/share/nginx/html/vendor/ 2>/dev/null || true
            sudo cp -r $DEPLOY_PATH/artifacts/rider-app/dist/* /usr/share/nginx/html/rider/ 2>/dev/null || true

            # AJKMart goes to root directory
            sudo cp -r $DEPLOY_PATH/artifacts/ajkmart/dist/* /usr/share/nginx/html/ 2>/dev/null || true

            echo "==> Updating nginx configuration..."
            sudo cp $DEPLOY_PATH/nginx.conf /etc/nginx/sites-available/ajkmart
            sudo ln -sf /etc/nginx/sites-available/ajkmart /etc/nginx/sites-enabled/ 2>/dev/null || true
            sudo rm -f /etc/nginx/sites-enabled/default 2>/dev/null || true
            sudo nginx -t && sudo systemctl reload nginx

            echo "==> Creating .env file..."
            cat > $DEPLOY_PATH/.env << EOF
          DATABASE_URL=${{ env.DATABASE_URL }}
          ADMIN_SECRET=${{ env.ADMIN_SECRET }}
          ALLOWED_ORIGINS=${{ env.ALLOWED_ORIGINS }}
          NODE_ENV=production
          LOG_LEVEL=info
          VITE_API_URL=${{ env.VITE_API_URL }}
          VITE_API_BASE_URL=${{ env.VITE_API_BASE_URL }}
          EXPO_PUBLIC_DOMAIN=${{ env.EXPO_PUBLIC_DOMAIN }}
          EOF

            echo "==> Installing dependencies (production only)..."
            cd $DEPLOY_PATH
            npm install -g pnpm --silent
            pnpm install --prod --frozen-lockfile

            echo "==> Running database migrations..."
            export DATABASE_URL="${{ env.DATABASE_URL }}"
            pnpm --filter @workspace/db run migrate || echo "Migration skipped"

            echo "==> Restarting API server with PM2..."
            npm install -g pm2 --silent
            pm2 describe ajkmart-api > /dev/null 2>&1 && \
              pm2 reload ajkmart-api --update-env || \
              pm2 start "node --enable-source-maps $DEPLOY_PATH/artifacts/api-server/dist/index.mjs" \
                --name ajkmart-api \
                --env production
            pm2 save

            echo "==> Waiting for API server to be healthy..."
            for i in {1..30}; do
              if curl -f http://localhost:3000/api/health > /dev/null 2>&1; then
                echo "✅ API server is healthy"
                break
              fi
              echo "Waiting for API server... ($i/30)"
              sleep 2
            done

            if [ $i -eq 30 ]; then
              echo "❌ API server failed to become healthy"
              exit 1
            fi

            echo "==> Testing frontend endpoints..."
            # Test main app
            if curl -f http://localhost/ > /dev/null 2>&1; then
              echo "✅ Main app (AJKMart) is accessible"
            else
              echo "❌ Main app failed to load"
              exit 1
            fi

            # Test admin panel
            if curl -f http://localhost/admin/ > /dev/null 2>&1; then
              echo "✅ Admin panel is accessible"
            else
              echo "❌ Admin panel failed to load"
            fi

            echo "==> Cleanup old backups..."
            # Keep only last 5 backups
            sudo find /opt -maxdepth 1 -name "ajkmart-backup-*" -type d | sort -r | tail -n +6 | xargs -r sudo rm -rf

            echo "==> Cleanup..."
            rm -f /tmp/api-dist.tar.gz /tmp/frontend-dist.tar.gz

            echo "==> Deploy complete! Version: ${{ env.SHA_SHORT }}"
          ENDSSH

      - name: Notify success
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "Commit: ${{ needs.build.outputs.sha_short }}"

      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Check the logs above for details."
